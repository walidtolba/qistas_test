<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QistasHR | اكتشف إمكانياتك</title>
    <meta name="description" content="تجربة اختبار حديثة وبسيطة مصممة للكشف عن نقاط قوتك الداخلية.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Main background elements -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <main id="main-container" class="glass-container">
            <!-- Content will be injected here -->
            <div id="screen" class="screen fade-in">
                <section class="welcome-screen">
                    <h1 class="logo">QistasHR</h1>
                    <div class="hero-content">
                        <h2>افهم مسارك.</h2>
                        <p>تقييم سريع لمدة دقيقتين لقياس حالة عقلك وتوازنك الحالي.</p>
                        <button id="start-btn" class="primary-btn">ابدأ التقييم</button>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
